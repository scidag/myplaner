server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/myplanner?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

myplanner:
  jwt:
    secret: ${JWT_SECRET:MyPlannerSecretKey2024SpringBootJWTTokenSecret}
    expiration: 86400000
